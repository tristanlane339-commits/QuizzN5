<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Kanji Quiz N5 🌸</title>

<style>
body{
margin:0;font-family:Arial;color:white;
display:flex;justify-content:center;align-items:center;height:100vh;
background:linear-gradient(rgba(15,23,42,0.85),rgba(15,23,42,0.95)),
url('https://images.unsplash.com/photo-1522383225653-ed111181a951');
background-size:cover;background-position:center;
}
.app{
width:95%;max-width:650px;background:rgba(17,24,39,0.9);
padding:20px;border-radius:20px;text-align:center;
}
.kanji-list{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-height:220px;overflow:auto;margin-bottom:10px}
.kanji-item input{display:none}
.kanji-item span{display:block;padding:6px;border-radius:6px;}
.kanji-item input:checked+span{background:#fb7185;color:black}
.small{font-size:10px;opacity:0.8;}
.hidden span{visibility:hidden}
.question{font-size:60px;margin:15px;}
input.answer{padding:10px;border-radius:10px;border:none;width:80%;text-align:center}
button{padding:10px;margin:5px;border:none;border-radius:10px;cursor:pointer;}
.correct{color:#4ade80;}
.wrong{color:#f87171;}
</style>
</head>

<body>
<div class="app">
<h2>🌸 Kanji Quiz N5 🌸</h2>

<select id="lang" onchange="changeLang()">
<option value="en">English</option>
<option value="fr">Français</option>
<option value="th">ไทย</option>
<option value="ar">العربية</option>
<option value="ja">日本語 (Hiragana)</option>
<option value="ro">Romaji</option>
</select>

<button onclick="toggleVisibility()">Show / Hide</button>

<div id="kanjiList" class="kanji-list"></div>

<button onclick="selectAll(true)">All</button>
<button onclick="selectAll(false)">None</button>
<button onclick="startQuiz()">Start</button>

<div id="quiz" style="display:none">
<div id="question" class="question"></div>
<input id="input" class="answer" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')check()">
<p id="result"></p>
<p id="score"></p>
</div>

</div>

<script>
const kanjis=[
{k:"一",m:{en:"one",fr:"un",th:"หนึ่ง",ar:"واحد",ja:"いち",ro:"ichi"}},
{k:"二",m:{en:"two",fr:"deux",th:"สอง",ar:"اثنان",ja:"に",ro:"ni"}},
{k:"三",m:{en:"three",fr:"trois",th:"สาม",ar:"ثلاثة",ja:"さん",ro:"san"}},
{k:"四",m:{en:"four",fr:"quatre",th:"สี่",ar:"أربعة",ja:"よん",ro:"yon"}},
{k:"五",m:{en:"five",fr:"cinq",th:"ห้า",ar:"خمسة",ja:"ご",ro:"go"}},
{k:"六",m:{en:"six",fr:"six",th:"หก",ar:"ستة",ja:"ろく",ro:"roku"}},
{k:"七",m:{en:"seven",fr:"sept",th:"เจ็ด",ar:"سبعة",ja:"なな",ro:"nana"}},
{k:"八",m:{en:"eight",fr:"huit",th:"แปด",ar:"ثمانية",ja:"はち",ro:"hachi"}},
{k:"九",m:{en:"nine",fr:"neuf",th:"เก้า",ar:"تسعة",ja:"きゅう",ro:"kyuu"}},
{k:"十",m:{en:"ten",fr:"dix",th:"สิบ",ar:"عشرة",ja:"じゅう",ro:"juu"}},
{k:"百",m:{en:"hundred",fr:"cent",th:"ร้อย",ar:"مائة",ja:"ひゃく",ro:"hyaku"}},
{k:"千",m:{en:"thousand",fr:"mille",th:"พัน",ar:"ألف",ja:"せん",ro:"sen"}},
{k:"万",m:{en:"ten thousand",fr:"dix mille",th:"หมื่น",ar:"عشرة آلاف",ja:"まん",ro:"man"}},
{k:"日",m:{en:"day/sun",fr:"jour",th:"วัน",ar:"يوم",ja:"にち",ro:"nichi"}},
{k:"月",m:{en:"moon/month",fr:"mois",th:"เดือน",ar:"شهر",ja:"つき",ro:"tsuki"}},
{k:"火",m:{en:"fire",fr:"feu",th:"ไฟ",ar:"نار",ja:"ひ",ro:"hi"}},
{k:"水",m:{en:"water",fr:"eau",th:"น้ำ",ar:"ماء",ja:"みず",ro:"mizu"}},
{k:"木",m:{en:"tree",fr:"arbre",th:"ไม้",ar:"شجرة",ja:"き",ro:"ki"}},
{k:"金",m:{en:"gold",fr:"or",th:"ทอง",ar:"ذهب",ja:"かね",ro:"kane"}},
{k:"土",m:{en:"earth",fr:"terre",th:"ดิน",ar:"أرض",ja:"つち",ro:"tsuchi"}},
{k:"山",m:{en:"mountain",fr:"montagne",th:"ภูเขา",ar:"جبل",ja:"やま",ro:"yama"}},
{k:"川",m:{en:"river",fr:"rivière",th:"แม่น้ำ",ar:"نهر",ja:"かわ",ro:"kawa"}},
{k:"田",m:{en:"field",fr:"champ",th:"นา",ar:"حقل",ja:"た",ro:"ta"}},
{k:"人",m:{en:"person",fr:"personne",th:"คน",ar:"شخص",ja:"ひと",ro:"hito"}},
{k:"口",m:{en:"mouth",fr:"bouche",th:"ปาก",ar:"فم",ja:"くち",ro:"kuchi"}},
{k:"目",m:{en:"eye",fr:"œil",th:"ตา",ar:"عين",ja:"め",ro:"me"}},
{k:"耳",m:{en:"ear",fr:"oreille",th:"หู",ar:"أذن",ja:"みみ",ro:"mimi"}},
{k:"手",m:{en:"hand",fr:"main",th:"มือ",ar:"يد",ja:"て",ro:"te"}},
{k:"足",m:{en:"foot",fr:"pied",th:"เท้า",ar:"قدم",ja:"あし",ro:"ashi"}},
{k:"力",m:{en:"power",fr:"force",th:"พลัง",ar:"قوة",ja:"ちから",ro:"chikara"}},
{k:"女",m:{en:"woman",fr:"femme",th:"ผู้หญิง",ar:"امرأة",ja:"おんな",ro:"onna"}},
{k:"男",m:{en:"man",fr:"homme",th:"ผู้ชาย",ar:"رجل",ja:"おとこ",ro:"otoko"}},
{k:"子",m:{en:"child",fr:"enfant",th:"เด็ก",ar:"طفل",ja:"こ",ro:"ko"}},
{k:"学",m:{en:"study",fr:"étude",th:"เรียน",ar:"دراسة",ja:"がく",ro:"gaku"}},
{k:"校",m:{en:"school",fr:"école",th:"โรงเรียน",ar:"مدرسة",ja:"こう",ro:"kou"}},
{k:"生",m:{en:"life",fr:"vie",th:"ชีวิต",ar:"حياة",ja:"せい",ro:"sei"}},
{k:"先",m:{en:"before",fr:"avant",th:"ก่อน",ar:"قبل",ja:"さき",ro:"saki"}},
{k:"私",m:{en:"I",fr:"je",th:"ฉัน",ar:"أنا",ja:"わたし",ro:"watashi"}},
{k:"友",m:{en:"friend",fr:"ami",th:"เพื่อน",ar:"صديق",ja:"とも",ro:"tomo"}},
{k:"本",m:{en:"book",fr:"livre",th:"หนังสือ",ar:"كتاب",ja:"ほん",ro:"hon"}},
{k:"語",m:{en:"language",fr:"langue",th:"ภาษา",ar:"لغة",ja:"ご",ro:"go"}},
{k:"上",m:{en:"up",fr:"haut",th:"บน",ar:"فوق",ja:"うえ",ro:"ue"}},
{k:"下",m:{en:"down",fr:"bas",th:"ล่าง",ar:"تحت",ja:"した",ro:"shita"}},
{k:"左",m:{en:"left",fr:"gauche",th:"ซ้าย",ar:"يسار",ja:"ひだり",ro:"hidari"}},
{k:"右",m:{en:"right",fr:"droite",th:"ขวา",ar:"يمين",ja:"みぎ",ro:"migi"}},
{k:"中",m:{en:"middle",fr:"milieu",th:"กลาง",ar:"وسط",ja:"なか",ro:"naka"}},
{k:"大",m:{en:"big",fr:"grand",th:"ใหญ่",ar:"كبير",ja:"おお",ro:"oo"}},
{k:"小",m:{en:"small",fr:"petit",th:"เล็ก",ar:"صغير",ja:"ちい",ro:"chii"}}
];

let selected=[],current,score=0,visible=true,lang="en";
const list=document.getElementById("kanjiList");

function renderList(){
list.innerHTML="";
kanjis.forEach((k,i)=>{
list.innerHTML+=`<label class="kanji-item"><input type="checkbox" value="${i}"><span>${k.k}<div class="small">${k.m[lang]}</div></span></label>`;
});
}
renderList();

function toggleVisibility(){visible=!visible;list.classList.toggle("hidden")}
function selectAll(v){document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=v)}

function startQuiz(){
selected=[...document.querySelectorAll("input:checked")].map(c=>kanjis[c.value]);
if(selected.length===0)return alert("Choose kanji");
score=0;
document.getElementById("quiz").style.display="block";
next();
}

function next(){
current=selected[Math.floor(Math.random()*selected.length)];
document.getElementById("question").textContent=current.k;
document.getElementById("input").value="";
}

function check(){
let val=document.getElementById("input").value.toLowerCase().trim();
let correct=current.m[lang].toLowerCase();

if(val===correct){
score++;
document.getElementById("result").textContent="Correct!";
document.getElementById("result").className="correct";
next();
}else{
document.getElementById("result").textContent="Wrong: "+correct;
document.getElementById("result").className="wrong";
}
document.getElementById("score").textContent="Score: "+score;
}

function changeLang(){
lang=document.getElementById("lang").value;
renderList();
}
</script>
</body>
</html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

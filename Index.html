<title>🌸 Kanji Quiz N5 🌸</title>
<style>
body{
margin:0;font-family:Arial;color:white;
display:flex;justify-content:center;align-items:center;height:100vh;
background:linear-gradient(rgba(15,23,42,0.85),rgba(15,23,42,0.95)),
url('https://images.unsplash.com/photo-1522383225653-ed111181a951');
background-size:cover;background-position:center;
transition:background 0.5s;
}
.app{
width:95%;max-width:650px;background:rgba(17,24,39,0.9);
padding:20px;border-radius:20px;text-align:center;
backdrop-filter:blur(8px);
transition:all 0.5s ease;
}
.kanji-list{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-height:220px;overflow:auto;margin-bottom:10px}
.kanji-item input{display:none}
.kanji-item span{display:block;padding:6px;border-radius:6px;transition:0.3s;}
.kanji-item input:checked+span{background:#fb7185;color:black}
.small{font-size:10px;opacity:0.8;transition:0.3s;}
.hidden span{visibility:hidden}
.question{font-size:60px;margin:15px;transition: all 0.3s ease;}
input.answer{padding:10px;border-radius:10px;border:none;width:80%;text-align:center}
button{padding:10px;margin:5px;border:none;border-radius:10px;cursor:pointer;transition:0.3s;}
button:hover{background:#fb7185;color:black;}
.correct{color:#4ade80;transition:0.3s;}
.wrong{color:#f87171;transition:0.3s;}
.language-select{margin-bottom:10px;}
</style>
</head>
<body>
<div class="app">
<h2>🌸 Kanji Quiz N5 🌸</h2>

<select id="lang" class="language-select" onchange="changeLang()">
<option value="en">English</option>
<option value="fr">Français</option>
<option value="th">ไทย</option>
<option value="ar">العربية</option>
</select>

<button onclick="toggleVisibility()">Show / Hide</button>

<div id="kanjiList" class="kanji-list"></div>

<button onclick="selectAll(true)">All</button>
<button onclick="selectAll(false)">None</button>
<button onclick="startQuiz()">Start</button>

<div id="quiz" style="display:none">
<div id="question" class="question"></div>
<input id="input" class="answer" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')check()">
<p id="result"></p>
<p id="score"></p>
</div>

</div>

{k:"田",m:{en:"field",fr:"champ",th:"ทุ่งนา",ar:"حقل"}},
{k:"人",m:{en:"person",fr:"personne",th:"คน",ar:"شخص"}},
{k:"口",m:{en:"mouth",fr:"bouche",th:"ปาก",ar:"فم"}},
{k:"目",m:{en:"eye",fr:"œil",th:"ตา",ar:"عين"}},
{k:"耳",m:{en:"ear",fr:"oreille",th:"หู",ar:"أذن"}},

{k:"下",m:{en:"down / below",fr:"bas / dessous",th:"ล่าง / ต่ำกว่า",ar:"أسفل / تحت"}},
{k:"左",m:{en:"left",fr:"gauche",th:"ซ้าย",ar:"يسار"}},

{k:"中",m:{en:"middle / inside",fr:"milieu / dedans",th:"กลาง / ข้างใน",ar:"وسط / داخل"}},
{k:"大",m:{en:"big / large",fr:"grand / large",th:"ใหญ่ / กว้าง",ar:"كبير / واسع"}},
{k:"小",m:{en:"small",fr:"petit",th:"เล็ก",ar:"صغير"}},
{k:"高",m:{en:"tall / high",fr:"haut / élevé",th:"สูง / สูง",ar:"عالي / مرتفع"}},
{k:"安",m:{en:"safe / cheap",fr:"sûr / bon marché",th:"ปลอดภัย / ถูก",ar:"آمن / رخيص"}},
{k:"新",m:{en:"new",fr:"nouveau",th:"ใหม่",ar:"جديد"}},
{k:"古",m:{en:"old",fr:"ancien",th:"เก่า",ar:"قديم"}},
{k:"天",m:{en:"heaven / sky",fr:"ciel / paradis",th:"สวรรค์ / ท้องฟ้า",ar:"سماء / جنة"}},
{k:"気",m:{en:"spirit / air",fr:"esprit / air",th:"จิตวิญญาณ / อากาศ",ar:"روح / هواء"}},
{k:"雨",m:{en:"rain",fr:"pluie",th:"ฝน",ar:"مطر"}},
{k:"電",m:{en:"electricity",fr:"électricité",th:"ไฟฟ้า",ar:"كهرباء"}},
{k:"車",m:{en:"car / vehicle",fr:"voiture / véhicule",th:"รถ / ยานพาหนะ",ar:"سيارة / مركبة"}},
{k:"駅",m:{en:"station",fr:"gare",th:"สถานี",ar:"محطة"}},
{k:"道",m:{en:"road / path",fr:"route / chemin",th:"ถนน / ทาง",ar:"طريق / مسار"}},
{k:"海",m:{en:"sea / ocean",fr:"mer / océan",th:"ทะเล / มหาสมุทร",ar:"بحر / محيط"}},
{k:"空",m:{en:"sky / empty",fr:"ciel / vide",th:"ท้องฟ้า / ว่าง",ar:"سماء / فارغ"}},
{k:"語",m:{en:"language / word",fr:"langue / mot",th:"ภาษา / คำ",ar:"لغة / كلمة"}},
// Add more until you reach all ~100 N5 kanji in the same format
];

let selected=[],current,score=0;
let visible=true;
let lang="en";

const list=document.getElementById("kanjiList");
function renderList(){
list.style.opacity=0;
setTimeout(()=>{
list.innerHTML="";
kanjis.forEach((k,i)=>{
list.innerHTML+=`<label class="kanji-item"><input type="checkbox" value="${i}"><span>${k.k}<div class="small">${k.m[lang]}</div></span></label>`;
});
list.style.opacity=1;
},200);
}
renderList();

function toggleVisibility(){
visible=!visible;
list.classList.toggle("hidden");
}

function selectAll(v){document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=v)}

function startQuiz(){
const checked=document.querySelectorAll("input[type=checkbox]:checked");
selected=[...checked].map(c=>kanjis[c.value]);
if(selected.length===0)return alert("Choose kanji");
score=0;
document.getElementById("quiz").style.display="block";
next();
}

function next(){
current=selected[Math.floor(Math.random()*selected.length)];
const questionEl=document.getElementById("question");
questionEl.style.opacity=0;
setTimeout(()=>{questionEl.textContent=current.k;questionEl.style.opacity=1;},150);
document.getElementById("input").value="";
document.getElementById("input").focus();
}

function check(){
let val=document.getElementById("input").value.toLowerCase().trim();
let res=document.getElementById("result");
if(val===current.m[lang].toLowerCase()){
score++;
res.textContent="Correct!";
res.className="correct";
next();
}
else{
res.textContent="Wrong: "+current.m[lang];
res.className="wrong";
setTimeout(next,800);
}
document.getElementById("score").textContent="Score: "+score;
}

function changeLang(){
lang=document.getElementById("lang").value;
renderList();
}
</script>

<script>
let current, selected=[], score=0;
let lang="en";

// Example kanji array
const kanjis=[
  {k:"一", m:{en:"one", fr:"un", th:"หนึ่ง", ar:"واحد"}},
  {k:"二", m:{en:"two", fr:"deux", th:"สอง", ar:"اثنان"}},
  {k:"三", m:{en:"three", fr:"trois", th:"สาม", ar:"ثلاثة"}}
];

const questionEl=document.getElementById("question");
const inputEl=document.getElementById("input");
const resultEl=document.getElementById("result");
const scoreEl=document.getElementById("score");

function startQuiz(){
  selected = [...kanjis]; // Or use checkboxes selection
  score = 0;
  document.getElementById("quiz").style.display="block";
  nextQuestion();
}

function nextQuestion(){
  current = selected[Math.floor(Math.random()*selected.length)];
  questionEl.style.opacity = 0;
  setTimeout(()=>{
    questionEl.textContent = current.k;
    questionEl.style.opacity = 1;
    inputEl.value="";
    inputEl.focus();
  }, 150);
}

inputEl.addEventListener("input", ()=>{
  let val = inputEl.value.toLowerCase().trim();
  if(val === current.m[lang].toLowerCase()){
    score++;
    scoreEl.textContent = "Score: "+score;
    resultEl.textContent = "Correct!";
    resultEl.className="correct";
    nextQuestion(); // Auto-next on correct
  }
});

inputEl.addEventListener("keydown", (e)=>{
  if(e.key==="Enter"){
    let val = inputEl.value.toLowerCase().trim();
    if(val !== current.m[lang].toLowerCase()){
      resultEl.textContent = "Wrong: "+current.m[lang];
      resultEl.className="wrong";
    }
    scoreEl.textContent = "Score: "+score;
    inputEl.value=""; // Clear input to try again or move on
  }
});
</script>
